format_version: "11"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git

include:
- path: ./common.bitrise.yml

workflows:
  # Compatibility workflow run by the steps-check step (go binary) for repos in a
  # different GitHub org than steps-check, where the modular `include:` mechanism
  # doesn't work. Repos in the same org should `include:` this file and call
  # `bundle::golangci-lint` directly instead.
  golangci-lint:
    description: Runs the shared golangci-lint check via the bundle below.
    steps:
    - bundle::golangci-lint:
        inputs:
        - golangci_lint_version: $GOLANGCI_LINT_VERSION
        - golangci_lint_config_file: $GOLANGCI_LINT_CONFIG_FILE

step_bundles:
  golangci-lint:
    inputs:
    - golangci_lint_version: error-not-set
    - golangci_lint_config_file: ""
      opts:
        description: |-
          Optional path to a golangci-lint config file (e.g. `.golangci.yml`) in the
          consumer repo. When set, it is used instead of the shared steps-check config.
          When empty, the shared config is downloaded from steps-check.
    steps:
    - bundle::download-file:
        title: Download golangci-lint install script
        inputs:
        - url: https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh
        - output_env_var: GOLANGCI_LINT_INSTALL_SCRIPT
    # Work around the limitation that included workflows can't access files from the repo (only bitrise.ymls can be included).
    # Skipped when the consumer provides its own config file via the golangci_lint_config_file input.
    - bundle::download-file:
        title: Download golangci-lint config file
        run_if: "{{enveq \"golangci_lint_config_file\" \"\"}}"
        inputs:
        - url: https://raw.githubusercontent.com/bitrise-steplib/steps-check/refs/heads/master/.golangci.yml
        - output_env_var: GOLANGCI_LINT_CONFIG_FILE
    - script@1:
        title: Run golangci-lint
        inputs:
        - content: |-
            #!/bin/env bash
            set -eo pipefail

            if [[ -z "$golangci_lint_version" || "$golangci_lint_version" == "error-not-set" ]]; then
              echo "Error: golangci_lint_version bundle input is not set."
              echo "Each project must pin an explicit golangci-lint version because golangci-lint only supports a narrow range of Go versions."
              echo "The version must be compatible with this project's Go toolchain. See: https://golangci-lint.run/docs/welcome/faq/#which-go-versions-are-supported"
              exit 1
            fi

            # Prefer the consumer-provided config file, fall back to the shared one downloaded above.
            config_file="$golangci_lint_config_file"
            if [[ -z "$config_file" ]]; then
              config_file="$GOLANGCI_LINT_CONFIG_FILE"
            fi

            sh "$GOLANGCI_LINT_INSTALL_SCRIPT" -b $(go env GOPATH)/bin v$golangci_lint_version
            set -x
            golangci-lint run --timeout 5m --color always --config "$config_file"
  go-test:
    steps:
    - script@1:
        title: Run go test
        inputs:
        - content: |-
            #!/bin/env bash
            set -eo pipefail

            # TODO: gotestfmt
            go test -v ./...
