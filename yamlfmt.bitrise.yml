format_version: "11"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git

include:
- path: ./common.bitrise.yml

workflows:
  # Compatibility workflow run by the steps-check step (go binary) for repos in a
  # different GitHub org than steps-check, where the modular `include:` mechanism
  # doesn't work. Repos in the same org should `include:` this file and call
  # `bundle::yamlfmt` directly instead.
  yamlfmt:
    description: Runs the shared yamlfmt formatter check via the bundle below.
    steps:
    - bundle::yamlfmt:
        inputs:
        - yamlfmt_exclude: $YAMLFMT_EXCLUDE

step_bundles:
  yamlfmt:
    inputs:
    - yamlfmt_exclude: _tmp/**,.bitrise.secrets.yml,.git/**,.github/**,vendor/**
    steps:
    # Work around the limitation that included bitrise.ymls can't access other files from the repo (only bitrise.ymls can be included)
    - bundle::download-file:
        title: Download ymlfmt config
        inputs:
        - url: https://raw.githubusercontent.com/bitrise-steplib/steps-check/refs/heads/master/.ymlfmt
        - output_env_var: YAMLFMT_CONFIG_FILE
    - script@1:
        title: yamlfmt
        inputs:
        - content: |-
            #!/bin/env bash
            set -eo pipefail

            go run github.com/google/yamlfmt/cmd/yamlfmt@v0.21.0 \
                -verbose \
                -conf $YAMLFMT_CONFIG_FILE \
                -match_type doublestar \
                -exclude $yamlfmt_exclude \
                '**/*.yml'
