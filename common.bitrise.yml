step_bundles:
  download-file:
    description: |-
      Downloads a file from a remote URL and stores the local path in an env var.
      Applies all sorts of best practices (caching, retries, etc.).
    inputs:
    - url: error-not-set
      opts:
        description: Remote URL to download.
    - output_env_var: BITRISE_DOWNLOAD_FILE_PATH
      opts:
        description: The local path of the downloaded file will be stored in this env var.
    steps:
    - script@1:
        title: Download file
        inputs:
        - content: |-
            #!/bin/env bash
            set -eo pipefail

            info()    { printf '\033[1m%s\033[0m\n' "$*"; }
            success() { printf '\033[32m✓\033[0m %s\n' "$*"; }

            if [[ -z "$url" || "$url" == "error-not-set" ]]; then
              printf '\033[31mError:\033[0m url bundle input is not set.\n'
              exit 1
            fi

            # Stable hash of the URL so the same URL always maps to the same path.
            # sha256sum (Linux/GNU) vs shasum -a 256 (macOS).
            if command -v sha256sum &>/dev/null; then
              url_hash=$(printf '%s' "$url" | sha256sum | cut -d' ' -f1)
            else
              url_hash=$(printf '%s' "$url" | shasum -a 256 | cut -d' ' -f1)
            fi

            filename=$(basename "$url")
            destination="${TMPDIR%/}/bitrise-downloads/$url_hash/$filename"

            if [[ -f "$destination" ]]; then
              success "cached"
              echo "  url:  $url"
              echo "  path: $destination"
              envman add --key "$output_env_var" --value "$destination"
              exit 0
            fi

            info "Downloading $filename"
            echo "  url:  $url"
            echo "  path: $destination"

            mkdir -p "$(dirname "$destination")"
            curl \
              --silent \
              --show-error \
              --fail \
              --location \
              --retry 3 \
              --retry-delay 2 \
              --retry-max-time 60 \
              --output "$destination" \
              "$url"
            success "Download complete"
            envman add --key "$output_env_var" --value "$destination"
