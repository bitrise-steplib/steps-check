title: |-
  Step linter
summary: |
  Runs step linters
description: |
  Runs step linters
type_tags:
- test
is_always_run: false
is_skippable: false

website: https://github.com/bitrise-steplib/steps-check.git

toolkit:
  go:
    package_name: github.com/bitrise-steplib/steps-check

inputs:
- step_dir: .
  opts:
    title: Step directory path
    description: Step directory path
    is_expand: true
    is_required: true
- workflow: |-
    lint
    unit_test
  opts:
    title: Validation workflow
    description: Select the validation workflow to run
    is_required: true
- skip_step_yml_validation: "no"
  opts:
    category: Deprecated
    title: Skip step.yml and README validation
    description: Skip step.yml and README validation
    value_options:
    - "yes"
    - "no"
- skip_go_checks: "no"
  opts:
    category: Deprecated
    title: Skip golang related checks
    description: Skip golang related checks
    value_options:
    - "yes"
    - "no"
- golangci_lint_version: ""
  opts:
    category: GitHub Org compatibility mode
    title: golangci-lint version
    description: |-
      golangci-lint version to use when running the `golangci-lint` workflow
      (the include-based compatibility mode). Must be compatible with the
      project's Go toolchain, see:
      https://golangci-lint.run/docs/welcome/faq/#which-go-versions-are-supported
    is_required: false
- golangci_lint_config_file: ""
  opts:
    category: GitHub Org compatibility mode
    title: golangci-lint config file
    description: |-
      Optional path to a golangci-lint config file (e.g. `.golangci.yml`) in the
      consumer repo, used when running the `golangci-lint` workflow. When set, it is
      used instead of the shared steps-check config. When empty, the shared config is
      downloaded from steps-check.
    is_required: false
- yamlfmt_exclude: _tmp/**,.bitrise.secrets.yml,.git/**,.github/**,vendor/**
  opts:
    category: GitHub Org compatibility mode
    title: yamlfmt exclude patterns
    description: |-
      Comma-separated doublestar glob patterns to exclude when running the
      `yamlfmt` workflow (the include-based compatibility mode).
    is_required: false
- steps_check_branch: master
  opts:
    category: GitHub Org compatibility mode
    title: steps-check branch (testing)
    description: |-
      Branch of the steps-check repo to pull the shared linter workflows from in
      compatibility mode (`yamlfmt` / `golangci-lint`). Defaults to master; override
      only to test changes to the shared configs before they are merged.
    is_required: false
