format_version: "11"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git

# This config is the "legacy" wrapper around the modular workflow includes for repos
# that live in a different GitHub org than steps-check, where the plain `include:`
# mechanism does not work. The steps-check step (this repo's go binary) embeds this
# file and runs the requested workflow against it (see main.go compatibility mode).
#
# Repos in the same org can include these bitrise.ymls directly instead:
#   include:
#   - repository: steps-check
#     branch: master
#     path: yamlfmt.bitrise.yml
#   - repository: steps-check
#     branch: master
#     path: golang.bitrise.yml
include:
- repository: steps-check
  branch: master
  path: yamlfmt.bitrise.yml
- repository: steps-check
  branch: master
  path: golang.bitrise.yml

workflows:
  yamlfmt:
    description: Runs the shared yamlfmt formatter check via the included bundle.
    steps:
    - bundle::yamlfmt:
        inputs:
        - yamlfmt_exclude: $YAMLFMT_EXCLUDE
  golangci-lint:
    description: Runs the shared golangci-lint check via the included bundle.
    steps:
    - bundle::golangci-lint:
        inputs:
        - golangci_lint_version: $GOLANGCI_LINT_VERSION
        - golangci_lint_config_file: $GOLANGCI_LINT_CONFIG_FILE
